services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - camera-network

  web:
    image: nginx:alpine
    container_name: camera-web
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - camera-network

networks:
  camera-network:
    driver: bridge
